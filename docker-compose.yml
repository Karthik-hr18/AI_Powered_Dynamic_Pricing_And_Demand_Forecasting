services:
  mongo:
    image: mongo:7
    container_name: pricing_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - platform_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pricing_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URL=${MONGODB_URL}
    volumes:
      - ./backend:/app
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - platform_net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pricing_worker
    restart: unless-stopped
    command: python -m app.worker.main
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URL=${MONGODB_URL}
    volumes:
      - ./backend:/app
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - platform_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pricing_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - platform_net

networks:
  platform_net:
    driver: bridge

volumes:
  mongo_data:
