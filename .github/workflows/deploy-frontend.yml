name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node Dependencies
        run: |
          npm ci --prefix frontend

      - name: Build Frontend
        run: |
          npm run build --prefix frontend

      - name: Deploy to Vercel
        run: |
          # TODO: Implement Vercel deployment integration in Milestone 15
          # For example, using Vercel CLI tool with project tokens:
          # npx vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --yes
          echo "Triggering Vercel frontend deployment placeholder..."
